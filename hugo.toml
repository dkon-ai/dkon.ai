baseURL = "https://dkon.ai/"
languageCode = "en-us"
title = "DKON"
theme = "swiss-operator"

[outputs]
home    = ['html', 'rss']
section = ['html', 'rss']

[params]
  description = "Distributed Kernel Omni-network. Consciousness exploring consciousness, upgrading consciousness."
  postsPerPage = 10
  favicon = "/favicon.svg"

[params.social]
  github = "https://github.com/dkon-ai"

[params.theme]
  accentBlue = "#0055FF"
  accentRed  = "#CC3300"
  showRss    = true
  localFonts = false

[params.categories]
  colors = { "AI" = "#0055FF", "Consciousness" = "#CC3300", "Design" = "#222222", "Engineering" = "#006644", "Philosophy" = "#663399" }

[params.footer]
  copyright = "© DKON & Rick Barraza"

[markup]
  [markup.highlight]
    style = "monokai"
    lineNos = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[menu]
  [[menu.main]]
    identifier = "home"
    name = "Home"
    url = "/"
    weight = 1
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 2
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 3
